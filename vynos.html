<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Výnos vs. Riziko | investicnitest.cz</title>
  <meta name="description" content="Porovnej realistické výnosy a rizika spořáku, ETF, akcií a krypta. Zjisti kolik procent výnosu reálně čekat." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: #f0ede8; text-decoration: none; }
    .nav-logo span { color: #c8a96e; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-link { padding: 0.4rem 0.75rem; border-radius: 8px; font-size: 0.8rem; color: rgba(240,237,232,0.5); text-decoration: none; transition: all 0.2s; white-space: nowrap; }
    .nav-link:hover { color: #f0ede8; background: rgba(255,255,255,0.05); }
    .nav-link.active { color: #c8a96e; }

    .root { min-height: 100vh; background: #0a0a0f; color: #f0ede8; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; padding: 6rem 1.25rem 2rem; position: relative; overflow: hidden; }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; }
    .bg-orb-1 { width: 600px; height: 600px; background: #c8a96e; top: -200px; right: -200px; }
    .bg-orb-2 { width: 400px; height: 400px; background: #4a7c59; bottom: -100px; left: -100px; }

    .card { width: 100%; max-width: 640px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 2rem; backdrop-filter: blur(20px); }
    @media (min-width: 480px) { .card { padding: 2.5rem; } }

    .badge { display: inline-block; background: rgba(200,169,110,0.15); border: 1px solid rgba(200,169,110,0.3); border-radius: 100px; padding: 0.4rem 1.2rem; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #c8a96e; margin-bottom: 1rem; }
    .title { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2rem); font-weight: 900; color: #f0ede8; line-height: 1.2; margin-bottom: 0.75rem; }
    .title span { color: #c8a96e; }
    .subtitle { color: rgba(240,237,232,0.5); font-size: 0.88rem; line-height: 1.6; margin-bottom: 2rem; }

    .assets { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.5rem; }

    /* Mobile-first asset card — vertical layout on small screens */
    .asset-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 1rem 1.125rem; cursor: pointer; transition: all 0.2s ease; }
    .asset-card:hover { background: rgba(200,169,110,0.06); border-color: rgba(200,169,110,0.25); }
    .asset-card.selected { background: rgba(200,169,110,0.1); border-color: #c8a96e; }

    .asset-top { display: flex; align-items: center; gap: 0.875rem; }
    .asset-icon { font-size: 1.3rem; width: 2rem; text-align: center; flex-shrink: 0; }
    .asset-main { flex: 1; min-width: 0; }
    .asset-name { font-weight: 500; color: #f0ede8; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .asset-desc { color: rgba(240,237,232,0.4); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .asset-right { text-align: right; flex-shrink: 0; }
    .asset-return { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: #c8a96e; white-space: nowrap; }
    .asset-risk-label { font-size: 0.68rem; color: rgba(240,237,232,0.35); }
    .risk-dots { display: flex; gap: 3px; margin-top: 0.35rem; }
    .risk-dot { width: 7px; height: 7px; border-radius: 2px; }

    /* Detail panel */
    .detail-panel { background: rgba(200,169,110,0.06); border: 1px solid rgba(200,169,110,0.2); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .detail-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: #f0ede8; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.6rem; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; margin-bottom: 1.25rem; }
    .detail-label { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(240,237,232,0.35); margin-bottom: 0.25rem; }
    .detail-value { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: #f0ede8; }
    .detail-value.gold { color: #c8a96e; }

    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 1.25rem 0; }

    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .pros-cons-title { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(240,237,232,0.35); margin-bottom: 0.5rem; }
    .pros-cons-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .pc-item { font-size: 0.8rem; color: rgba(240,237,232,0.6); display: flex; gap: 0.4rem; line-height: 1.4; }
    .pc-item.pro::before { content: "+"; color: #4a7c59; font-weight: 700; flex-shrink: 0; }
    .pc-item.con::before { content: "−"; color: #c0504d; font-weight: 700; flex-shrink: 0; }

    .scenario-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
    .scenario-item { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 0.75rem; text-align: center; }
    .scenario-label { font-size: 0.65rem; color: rgba(240,237,232,0.35); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.3rem; }
    .scenario-value { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; }
    .scenario-value.bad { color: #c0504d; }
    .scenario-value.ok { color: rgba(240,237,232,0.7); }
    .scenario-value.good { color: #4a7c59; }

    .note { color: rgba(240,237,232,0.45); font-size: 0.8rem; line-height: 1.6; margin-bottom: 0.5rem; }

    .cta-btn { width: 100%; background: linear-gradient(135deg, #c8a96e, #a8894e); border: none; border-radius: 12px; padding: 0.9rem 2rem; color: #0a0a0f; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; display: block; text-align: center; text-decoration: none; margin-top: 1.25rem; }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,169,110,0.3); }

    .tools-cta { margin-top: 1.5rem; }
    .tools-cta-label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(240,237,232,0.35); margin-bottom: 0.75rem; }
    .tools-cta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
    .tool-cta-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 0.875rem 1rem; text-decoration: none; color: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 0.6rem; }
    .tool-cta-card:hover { border-color: rgba(200,169,110,0.25); background: rgba(200,169,110,0.05); }
    .tool-cta-icon { font-size: 1.1rem; flex-shrink: 0; }
    .tool-cta-name { font-size: 0.85rem; font-weight: 500; color: #f0ede8; margin-bottom: 0.1rem; }
    .tool-cta-text { font-size: 0.75rem; color: rgba(240,237,232,0.5); line-height: 1.3; }

    .disclaimer { margin-top: 1.5rem; color: rgba(240,237,232,0.25); font-size: 0.7rem; line-height: 1.6; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">investicni<span>test</span>.cz</a>
    <div class="nav-links">
      <a href="/kviz" class="nav-link">Kvíz</a>
      <a href="/kalkulacka" class="nav-link">Kalkulačka</a>
      <a href="/vynos" class="nav-link active">Výnos</a>
    </div>
  </nav>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const riskColors = ["","#4a7c59","#7ab87a","#c8a96e","#e07a3a","#c0504d"];

    const assets = [
      { id:"sporiak", icon:"🏦", name:"Spořicí účet", desc:"Bankovní produkt, pojištěný státem", returnMin:3, returnMax:4, returnTypical:3.5, risk:1, riskLabel:"Žádné",
        pros:["Pojištěno do 100 000 €","Okamžitá likvidita","Žádné znalosti nutné"], cons:["Výnos pod inflací","Reálná ztráta hodnoty","Žádný růstový potenciál"],
        scenarioBad:"+2 %", scenarioOk:"+3,5 %", scenarioGood:"+4 %", note:"Vhodné jako finanční rezerva (3–6 měsíců výdajů), ne jako investice.", url:"kalkulacka.html" },
      { id:"dluhopisy", icon:"📄", name:"Dluhopisy", desc:"Státní dluhopisy, smíšené fondy", returnMin:4, returnMax:6, returnTypical:5, risk:2, riskLabel:"Nízké",
        pros:["Stabilní výnosy","Nižší volatilita","Diverzifikace portfolia"], cons:["Nižší výnos než akcie","Citlivost na úrokové sazby","Inflační riziko"],
        scenarioBad:"+1 %", scenarioOk:"+5 %", scenarioGood:"+7 %", note:"Vhodné pro kratší horizont (2–5 let) nebo jako část konzervativního portfolia.", url:"kalkulacka.html" },
      { id:"etf", icon:"📊", name:"ETF — globální index", desc:"S&P 500, MSCI World, celosvětová diverzifikace", returnMin:7, returnMax:10, returnTypical:8, risk:3, riskLabel:"Střední",
        pros:["Nejlepší poměr výnos/riziko","Automatická diverzifikace","Nízké poplatky"], cons:["Krátkodobé poklesy až −40 %","Vyžaduje horizont 5+ let","Výnos není zaručen"],
        scenarioBad:"−15 %", scenarioOk:"+8 %", scenarioGood:"+20 %", note:"Zlatý standard pasivního investování. Doporučený horizont 10+ let.", url:"kalkulacka.html" },
      { id:"akcie", icon:"📈", name:"Jednotlivé akcie", desc:"Apple, NVIDIA, výběr konkrétních firem", returnMin:0, returnMax:30, returnTypical:10, risk:4, riskLabel:"Vysoké",
        pros:["Potenciál překonat trh","Přímé vlastnictví firmy","Dividendy"], cons:["Vysoké riziko jedné firmy","Vyžaduje znalosti a čas","Emocionálně náročné"],
        scenarioBad:"−50 %", scenarioOk:"+10 %", scenarioGood:"+40 %", note:"Vhodné jako doplněk k ETF. Pro začátečníky max. 20 % portfolia.", url:"kalkulacka.html" },
      { id:"krypto", icon:"₿", name:"Kryptoměny", desc:"Bitcoin, Ethereum a další digitální aktiva", returnMin:-80, returnMax:200, returnTypical:15, risk:5, riskLabel:"Velmi vysoké",
        pros:["Potenciál extrémních výnosů","Decentralizace","Likvidita 24/7"], cons:["Extrémní volatilita","Regulatorní nejistota","Žádná vnitřní hodnota u většiny"],
        scenarioBad:"−80 %", scenarioOk:"+15 %", scenarioGood:"+200 %", note:"Pouze pro zkušené investory. Nikdy nevkládej více než si můžeš dovolit ztratit.", url:"kalkulacka.html" },
    ];

    function RiskDots({ level }) {
      return (
        <div className="risk-dots">
          {[1,2,3,4,5].map(i => <div key={i} className="risk-dot" style={{background: i <= level ? riskColors[level] : 'rgba(255,255,255,0.1)'}} />)}
        </div>
      );
    }

    function App() {
      const [selected, setSelected] = useState(null);
      const asset = assets.find(a => a.id === selected);

      return (
        <div className="root">
          <div className="bg-orb bg-orb-1" /><div className="bg-orb bg-orb-2" />
          <div className="card">
            <div className="badge">Průvodce výnosem</div>
            <h1 className="title">Kolik % výnosu<br /><span>reálně čekat?</span></h1>
            <p className="subtitle">Vyber typ investice a zjisti realistický výnos — pak ho dosad do kalkulačky.</p>

            <div className="assets">
              {assets.map(a => (
                <div key={a.id} className={`asset-card${selected === a.id ? ' selected' : ''}`} onClick={() => setSelected(selected === a.id ? null : a.id)}>
                  <div className="asset-top">
                    <span className="asset-icon">{a.icon}</span>
                    <div className="asset-main">
                      <div className="asset-name">{a.name}</div>
                      <div className="asset-desc">{a.desc}</div>
                      <RiskDots level={a.risk} />
                    </div>
                    <div className="asset-right">
                      <div className="asset-return">{a.returnMin < 0 ? a.returnMin : a.returnMin}–{a.returnMax} %</div>
                      <div className="asset-risk-label">{a.riskLabel} riziko</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {asset && (
              <div className="detail-panel">
                <div className="detail-title"><span>{asset.icon}</span>{asset.name}</div>
                <div className="detail-grid">
                  <div><div className="detail-label">Typický roční výnos</div><div className="detail-value gold">~{asset.returnTypical} % p.a.</div></div>
                  <div><div className="detail-label">Rozsah výnosu</div><div className="detail-value">{asset.returnMin} – {asset.returnMax} %</div></div>
                </div>
                <div className="divider" />
                <div className="pros-cons">
                  <div>
                    <div className="pros-cons-title">Výhody</div>
                    <div className="pros-cons-list">{asset.pros.map((p,i) => <div key={i} className="pc-item pro">{p}</div>)}</div>
                  </div>
                  <div>
                    <div className="pros-cons-title">Nevýhody</div>
                    <div className="pros-cons-list">{asset.cons.map((c,i) => <div key={i} className="pc-item con">{c}</div>)}</div>
                  </div>
                </div>
                <div className="divider" />
                <div className="pros-cons-title" style={{marginBottom:'0.75rem'}}>Scénáře — co se může stát za rok</div>
                <div className="scenario-row">
                  <div className="scenario-item"><div className="scenario-label">Špatný rok</div><div className="scenario-value bad">{asset.scenarioBad}</div></div>
                  <div className="scenario-item"><div className="scenario-label">Průměrný rok</div><div className="scenario-value ok">{asset.scenarioOk}</div></div>
                  <div className="scenario-item"><div className="scenario-label">Dobrý rok</div><div className="scenario-value good">{asset.scenarioGood}</div></div>
                </div>
                <div className="divider" />
                <div className="note">💡 {asset.note}</div>
                <a className="cta-btn" href="/kalkulacka">Dosadit {asset.returnTypical} % do kalkulačky →</a>
              </div>
            )}

            <div className="tools-cta">
              <div className="tools-cta-label">Další nástroje</div>
              <div className="tools-cta-grid">
                <a href="/kviz" className="tool-cta-card">
                  <span className="tool-cta-icon">📊</span>
                  <div><div className="tool-cta-name">Investiční kvíz</div><div className="tool-cta-text">Kde začít investovat?</div></div>
                </a>
                <a href="/kalkulacka" className="tool-cta-card">
                  <span className="tool-cta-icon">📈</span>
                  <div><div className="tool-cta-name">Kalkulačka</div><div className="tool-cta-text">Složené úročení</div></div>
                </a>
              </div>
            </div>

            <div className="disclaimer">Uvedené výnosy jsou historické průměry a orientační odhady. Minulé výnosy nezaručují výnosy budoucí. Investování je spojeno s rizikem ztráty vložených prostředků. Neposkytujeme investiční poradenství ve smyslu zákona č. 256/2004 Sb.</div>
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
