<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulačka složeného úročení | investicnitest.cz</title>
  <meta name="description" content="Spočítej kolik vyděláš díky složenému úročení. Zadej měsíční částku, horizont a výnos — uvidíš interaktivní graf růstu." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: #f0ede8; text-decoration: none; }
    .nav-logo span { color: #c8a96e; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-link { padding: 0.4rem 0.75rem; border-radius: 8px; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; color: rgba(240,237,232,0.5); text-decoration: none; transition: all 0.2s; white-space: nowrap; }
    .nav-link:hover { color: #f0ede8; background: rgba(255,255,255,0.05); }
    .nav-link.active { color: #c8a96e; }

    .root { min-height: 100vh; background: #0a0a0f; color: #f0ede8; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; padding: 6rem 1.25rem 2rem; position: relative; overflow: hidden; }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; }
    .bg-orb-1 { width: 600px; height: 600px; background: #c8a96e; top: -200px; right: -200px; }
    .bg-orb-2 { width: 400px; height: 400px; background: #4a7c59; bottom: -100px; left: -100px; }

    .card { width: 100%; max-width: 640px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 2rem; backdrop-filter: blur(20px); }
    @media (min-width: 480px) { .card { padding: 2.5rem; } }

    .badge { display: inline-block; background: rgba(200,169,110,0.15); border: 1px solid rgba(200,169,110,0.3); border-radius: 100px; padding: 0.4rem 1.2rem; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #c8a96e; margin-bottom: 1rem; }
    .title { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2rem); font-weight: 900; color: #f0ede8; line-height: 1.2; margin-bottom: 0.75rem; }
    .title span { color: #c8a96e; }
    .subtitle { color: rgba(240,237,232,0.5); font-size: 0.88rem; line-height: 1.6; margin-bottom: 2rem; }

    .inputs { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 1.75rem; }
    .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .input-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(240,237,232,0.4); font-weight: 500; }
    .input-row { display: flex; align-items: center; gap: 0.75rem; }
    .input-field { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.875rem 1.25rem; color: #f0ede8; font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s; -moz-appearance: textfield; }
    .input-field::-webkit-outer-spin-button, .input-field::-webkit-inner-spin-button { -webkit-appearance: none; }
    .input-field:focus { border-color: rgba(200,169,110,0.5); }
    .input-unit { color: rgba(240,237,232,0.4); font-size: 0.85rem; min-width: 2rem; text-align: right; }

    .slider-row { display: flex; align-items: center; gap: 1rem; }
    .slider { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.1); outline: none; cursor: pointer; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #c8a96e; cursor: pointer; box-shadow: 0 0 8px rgba(200,169,110,0.4); }
    .slider-value { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: #c8a96e; min-width: 3.5rem; text-align: right; }

    .results { background: rgba(200,169,110,0.06); border: 1px solid rgba(200,169,110,0.15); border-radius: 18px; padding: 1.5rem; margin-bottom: 1.75rem; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .result-item { }
    .result-value { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 3vw, 1.3rem); font-weight: 900; color: #f0ede8; margin-bottom: 0.2rem; line-height: 1.2; }
    .result-value.highlight { color: #c8a96e; font-size: clamp(1.2rem, 4vw, 1.6rem); }
    .result-value.green { color: #4a7c59; }
    .result-label { font-size: 0.7rem; color: rgba(240,237,232,0.4); letter-spacing: 0.04em; }
    .result-total { grid-column: span 2; padding-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.06); }

    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 1.25rem 0; }

    .chart-wrap { position: relative; height: 120px; }
    .chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 100%; padding-bottom: 22px; }
    .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; height: 100%; }
    .bar-inner { width: 100%; display: flex; flex-direction: column; justify-content: flex-end; flex: 1; }
    .bar-profit { width: 100%; background: linear-gradient(180deg, #c8a96e, #a8894e); border-radius: 3px 3px 0 0; }
    .bar-invested { width: 100%; background: rgba(255,255,255,0.12); border-radius: 3px 3px 0 0; }
    .bar-label { position: absolute; bottom: -20px; font-size: 0.6rem; color: rgba(240,237,232,0.3); white-space: nowrap; }

    .chart-legend { display: flex; gap: 1.25rem; margin-top: 1.75rem; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.73rem; color: rgba(240,237,232,0.5); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    .tools-cta { margin-top: 1.5rem; }
    .tools-cta-label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(240,237,232,0.35); margin-bottom: 0.75rem; }
    .tools-cta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
    .tool-cta-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 0.875rem 1rem; text-decoration: none; color: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 0.6rem; }
    .tool-cta-card:hover { border-color: rgba(200,169,110,0.25); background: rgba(200,169,110,0.05); }
    .tool-cta-icon { font-size: 1.1rem; flex-shrink: 0; }
    .tool-cta-name { font-size: 0.85rem; font-weight: 500; color: #f0ede8; margin-bottom: 0.1rem; }
    .tool-cta-text { font-size: 0.75rem; color: rgba(240,237,232,0.5); line-height: 1.3; }

    .disclaimer { margin-top: 1.5rem; color: rgba(240,237,232,0.25); font-size: 0.7rem; line-height: 1.6; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">investicni<span>test</span>.cz</a>
    <div class="nav-links">
      <a href="/kviz" class="nav-link">Kvíz</a>
      <a href="/kalkulacka" class="nav-link active">Kalkulačka</a>
      <a href="/vynos" class="nav-link">Výnos</a>
    </div>
  </nav>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    function formatCZK(value) {
      if (value >= 1000000) return (value / 1000000).toFixed(1).replace('.', ',') + ' mil. Kč';
      return Math.round(value).toLocaleString('cs-CZ') + ' Kč';
    }

    function calculate(monthly, years, rate) {
      const monthlyRate = rate / 100 / 12;
      const months = years * 12;
      let total = 0;
      for (let i = 0; i < months; i++) total = (total + monthly) * (1 + monthlyRate);
      const invested = monthly * months;
      return { total, invested, profit: total - invested };
    }

    function App() {
      const [monthly, setMonthly] = useState(2000);
      const [years, setYears] = useState(20);
      const [rate, setRate] = useState(7);
      const result = useMemo(() => calculate(monthly, years, rate), [monthly, years, rate]);

      const chartPoints = useMemo(() => {
        const points = [];
        const step = Math.max(1, Math.floor(years / 8));
        for (let y = step; y <= years; y += step) points.push({ year: y, ...calculate(monthly, y, rate) });
        if (points[points.length - 1]?.year !== years) points.push({ year: years, ...result });
        return points;
      }, [monthly, years, rate, result]);

      const maxTotal = Math.max(...chartPoints.map(p => p.total), 1);

      return (
        <div className="root">
          <div className="bg-orb bg-orb-1" /><div className="bg-orb bg-orb-2" />
          <div className="card">
            <div className="badge">Kalkulačka</div>
            <h1 className="title">Jak moc vydělá<br /><span>složené úročení?</span></h1>
            <p className="subtitle">Uprav parametry a sleduj jak roste tvůj majetek v čase.</p>

            <div className="inputs">
              <div className="input-group">
                <div className="input-label">Měsíční investice</div>
                <div className="input-row">
                  <input className="input-field" type="number" value={monthly} min={100} max={100000} step={100} onChange={e => setMonthly(Math.max(0, Number(e.target.value)))} />
                  <span className="input-unit">Kč</span>
                </div>
              </div>
              <div className="input-group">
                <div className="input-label">Investiční horizont — {years} let</div>
                <div className="slider-row">
                  <input className="slider" type="range" min={1} max={40} value={years} onChange={e => setYears(Number(e.target.value))} style={{background:`linear-gradient(to right,#c8a96e ${(years-1)/39*100}%,rgba(255,255,255,0.1) ${(years-1)/39*100}%)`}} />
                  <span className="slider-value">{years} let</span>
                </div>
              </div>
              <div className="input-group">
                <div className="input-label">Průměrný roční výnos — {rate} %</div>
                <div className="slider-row">
                  <input className="slider" type="range" min={1} max={15} step={0.5} value={rate} onChange={e => setRate(Number(e.target.value))} style={{background:`linear-gradient(to right,#c8a96e ${(rate-1)/14*100}%,rgba(255,255,255,0.1) ${(rate-1)/14*100}%)`}} />
                  <span className="slider-value">{rate} %</span>
                </div>
              </div>
            </div>

            <div className="results">
              <div className="results-grid">
                <div className="result-item">
                  <div className="result-value">{formatCZK(result.invested)}</div>
                  <div className="result-label">Vloženo celkem</div>
                </div>
                <div className="result-item">
                  <div className="result-value green">{formatCZK(result.profit)}</div>
                  <div className="result-label">Výnos z úroků</div>
                </div>
                <div className="result-item result-total">
                  <div className="result-value highlight">{formatCZK(result.total)}</div>
                  <div className="result-label">Celková hodnota portfolia</div>
                </div>
              </div>
              <div className="divider" />
              <div className="chart-wrap">
                <div className="chart-bars">
                  {chartPoints.map((p, i) => {
                    const totalH = (p.total / maxTotal) * 100;
                    const investedH = (p.invested / maxTotal) * 100;
                    return (
                      <div key={i} className="bar-group">
                        <div className="bar-inner">
                          <div className="bar-profit" style={{height:`${totalH - investedH}%`}} />
                          <div className="bar-invested" style={{height:`${investedH}%`}} />
                        </div>
                        <div className="bar-label">{p.year}r</div>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="chart-legend">
                <div className="legend-item"><div className="legend-dot" style={{background:'rgba(255,255,255,0.15)'}} />Vloženo</div>
                <div className="legend-item"><div className="legend-dot" style={{background:'#c8a96e'}} />Výnos z úroků</div>
              </div>
            </div>

            <div className="tools-cta">
              <div className="tools-cta-label">Další nástroje</div>
              <div className="tools-cta-grid">
                <a href="/kviz" className="tool-cta-card">
                  <span className="tool-cta-icon">📊</span>
                  <div><div className="tool-cta-name">Investiční kvíz</div><div className="tool-cta-text">Kde začít investovat?</div></div>
                </a>
                <a href="/vynos" className="tool-cta-card">
                  <span className="tool-cta-icon">⚖️</span>
                  <div><div className="tool-cta-name">Výnos vs riziko</div><div className="tool-cta-text">Kolik % reálně čekat?</div></div>
                </a>
              </div>
            </div>

            <div className="disclaimer">Kalkulačka slouží pouze pro ilustraci principu složeného úročení. Výsledky jsou orientační a nezaručují skutečný výnos. Investování je spojeno s rizikem ztráty vložených prostředků. Neposkytujeme investiční poradenství ve smyslu zákona č. 256/2004 Sb.</div>
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
